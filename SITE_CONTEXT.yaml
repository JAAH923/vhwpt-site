technical:
  stack: Astro static site; user wants a modern non-WordPress build.
  package_manager: pnpm
  dev_server: Astro dev server
  local_url: http://localhost:4321/
  tailnet_url: https://justins-mac-mini.tail4bfb07.ts.net/
  public_preview_url: https://justins-mac-mini.tail4bfb07.ts.net/
  public_preview_provider: Tailscale Funnel
  github_pages_url: https://jaah923.github.io/vhwpt-site/
  github_repository: https://github.com/JAAH923/vhwpt-site
  tailnet_ip_url: http://100.98.86.93:4321/
  important_commands:
    - pnpm dev -- --port 4321
    - pnpm build
    - /Applications/Tailscale.app/Contents/MacOS/Tailscale serve --bg --yes 4321
    - /Applications/Tailscale.app/Contents/MacOS/Tailscale funnel --bg --yes 4321
    - /Applications/Tailscale.app/Contents/MacOS/Tailscale funnel status
    - /Applications/Tailscale.app/Contents/MacOS/Tailscale funnel --https=443 off
    - /Applications/Tailscale.app/Contents/MacOS/Tailscale serve status
  environment_variables: []
  integrations:
    refero_mcp:
      status: available
      notes: Configured in Codex MCP settings for design-screen and flow inspiration.

decisions:
  - date: 2026-04-16
    decision: Add SITE_CONTEXT.yaml for cross-session continuity.
    rationale: Provide a stable, editable project memory file that future sessions can read first.
  - date: 2026-04-16
    decision: Capture the existing vhwpt.com public site map before redesign work.
    rationale: Establish a factual baseline for current pages, services, WordPress content types, and commerce scaffolding.
  - date: 2026-04-16
    decision: Save Bruce Valencia headshot and Valencia Health & Wellness logo into assets/brand.
    rationale: Keep source brand assets local for design exploration and implementation.
  - date: 2026-04-16
    decision: Use the full Valencia Health & Wellness logo as the primary logo asset.
    rationale: User clarified the attached full logo should be used; keep the square mark only as an icon/favicon-style asset.
  - date: 2026-04-16
    decision: Use the user-reuploaded local headshot and logo from assets/brand as the canonical brand images.
    rationale: User provided preferred local source files; copied them into public/assets/brand with clean filenames for Astro.
  - date: 2026-04-16
    decision: Treat WordPress as the legacy/source site only, not the rebuild platform.
    rationale: User clarified they want something more modern than WordPress for the new build.
  - date: 2026-04-16
    decision: Start the rebuild foundation with Astro and pnpm.
    rationale: Astro is modern, fast, content-friendly, and well-suited to a polished one-page service/marketing site.
  - date: 2026-04-16
    decision: Expose the local Astro dev server via Tailscale Serve.
    rationale: Allows tailnet devices to preview the local site while keeping the dev server off the public internet.
  - date: 2026-04-16
    decision: Enable Tailscale Funnel for public preview.
    rationale: Allows Bruce or other non-tailnet reviewers to access the local Astro preview through a temporary public HTTPS URL.
  - date: 2026-04-16
    decision: Upgrade the initial Astro page toward a premium one-page landing page direction.
    rationale: User felt the starter page was too basic; revised hero, trust signals, service cards, doctor section, process, and consultation CTA to feel more polished and brand-led.
  - date: 2026-04-16
    decision: Replace the card-heavy landing page with a cinematic editorial one-page direction.
    rationale: User wanted a less standard, more Apple-like premium feel; removed most card UI, enlarged type, used the logo as an atmospheric hero mark, and rebuilt services as full-width editorial scenes.
  - date: 2026-04-16
    decision: Create five parallel design concept routes using agent-generated art direction.
    rationale: User requested multiple versions from the current dark premium vibe through a clean white headshot-led direction, so concepts now live at /concepts/1 through /concepts/5 with a comparison index at /concepts.
  - date: 2026-04-17
    decision: Use Version 4 Calm Care as the foundation and reformat its top fold.
    rationale: User selected Version 4 and provided a reference with top contact strip, white nav, appointment CTA, large hero, and three visible value cards.
  - date: 2026-04-17
    decision: Optimize rendered logo assets for the Astro site.
    rationale: The header was using the 2048px 4.9 MB source PNG, so pages now render smaller header, display, and icon variants while preserving the original source asset.
  - date: 2026-04-17
    decision: Use assets/brand/bruce-headshot2.webp as the authentic Bruce Valencia headshot.
    rationale: User clarified this WebP is the correct human headshot; live pages now use public/assets/brand/bruce-headshot.webp instead of the older 200px JPEG.
  - date: 2026-04-17
    decision: Publish the Astro preview through GitHub Pages.
    rationale: User wanted a stable public client-preview URL that does not depend on Tailscale Funnel or the local Mac staying online.
  - date: 2026-04-17
    decision: Promote Version 4 Calm Care as the primary site direction.
    rationale: User chose Version 4 as the foundation and asked to deprecate all other versions; homepage now renders Version 4 and concept routes redirect home.
  - date: 2026-04-17
    decision: Rework the homepage above-the-fold into a white editorial clinic layout.
    rationale: User preferred a reference with a white nav and calm headshot-led hero, so the primary homepage now opens with Bruce's portrait and the large clinical-care headline on a pale background.
  - date: 2026-04-17
    decision: Refine the editorial fold toward an all-white premium layout.
    rationale: User asked to remove the grey/green band, enlarge Bruce's headshot, round the portrait edges, remove the red inset frame, and reduce the headline size.
  - date: 2026-04-17
    decision: Add a hamburger navigation pattern for mobile.
    rationale: User asked to clean up the mobile header and move links behind a hamburger menu while keeping the desktop header intact.

open_tasks:
  - Define the redesign brief and target conversion goals.
  - Refine the first landing page direction using Refero inspiration.
  - Capture visual inspiration from Refero once design exploration starts.
  - Decide whether WooCommerce/shop functionality is part of the rebuild or should be removed/deprioritized.

handoff_notes:
  read_first:
